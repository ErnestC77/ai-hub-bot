# ВНИМАНИЕ: это blueprint для чистого создания сервисов. Работающие сервисы
# были заведены вручную -- НЕ синкать этот файл на них бездумно. Значения-
# секреты (sync: false) вносятся в UI/через API; URL-поля -- полные https://.
databases:
  - name: ai-hub-bot-db
    databaseName: ai_hub_bot
    user: ai_hub_bot
    plan: free

services:
  - type: keyvalue
    name: ai-hub-bot-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: ai-hub-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV                 # активирует fail-fast проверку секретов
        value: prod
      - key: BOT_MODE
        value: webhook
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      # URL-поля: полный https:// -- вносятся вручную (fromService hostport даёт
      # host:port без схемы, что ломает Telegram-webhook / fal-callback / CORS).
      - key: WEBAPP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: PAYMENT_RETURN_URL
        sync: false
      - key: YOOKASSA_WEBHOOK_URL
        sync: false
      - key: DATABASE_URL            # postgresql:// -> app нормализует в +asyncpg
        fromDatabase:
          name: ai-hub-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-hub-bot-redis
          property: connectionString
      # Провайдеры: приложение использует ТОЛЬКО OpenRouter (текст) + fal (медиа).
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FAL_IMAGE_KEY
        sync: false
      - key: FAL_VIDEO_KEY
        sync: false
      - key: FAL_WEBHOOK_SECRET      # сверяется на /api/fal/webhook; тот же сервис его и шлёт
        generateValue: true
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false

  - type: web
    name: ai-hub-frontend
    runtime: docker
    dockerfilePath: ./frontend-next/Dockerfile
    dockerContext: ./frontend-next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
    plan: starter
    autoDeploy: false

  - type: worker
    name: ai-hub-bot-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: "python -m app.worker"
    plan: starter
    envVars:
      # worker шлёт fal/OpenRouter НЕ вызывает -- ему провайдер-ключи не нужны.
      # APP_ENV=prod безопасен: web-fail-fast живёт в app.main.lifespan, а не в
      # Settings, поэтому worker он не трогает.
      - key: APP_ENV
        value: prod
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: FRONTEND_URL            # нужен для кнопки в уведомлении о покупке
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-hub-bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-hub-bot-redis
          property: connectionString
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
